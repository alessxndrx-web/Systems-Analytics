version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadmap}
      POSTGRES_DB: ${POSTGRES_DB:-leadmap}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
